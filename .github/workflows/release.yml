name: Version and Release

on:
    release:
        types: [created]

jobs:
    version-and-release:
        name: Update Version and Create Release Asset
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code at tag
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-depth: 0

            - name: Get version from tag
              id: get_version
              run: |
                  TAG_NAME="${{ github.event.release.tag_name }}"
                  VERSION="${TAG_NAME#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
                  echo "Version: $VERSION"
                  echo "Tag: $TAG_NAME"

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Replace __VERSION__ in plugin file
              run: |
                  sed -i "s/__VERSION__/${{ steps.get_version.outputs.version }}/g" hm-split-background.php
                  echo "Updated plugin header:"
                  cat hm-split-background.php | grep "Version:"

            - name: Commit version changes to tag
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"

                  git add hm-split-background.php build/
                  git commit -m "Release ${{ steps.get_version.outputs.version }}"

                  git tag -d "${{ steps.get_version.outputs.tag }}"
                  git tag -a "${{ steps.get_version.outputs.tag }}" -m "Release ${{ steps.get_version.outputs.tag }}"

                  git push origin "${{ steps.get_version.outputs.tag }}" --force

            - name: Create ZIP archive
              run: |
                  mkdir -p release

                  rsync -av \
                      --exclude='.git' \
                      --exclude='.github' \
                      --exclude='node_modules' \
                      --exclude='src' \
                      --exclude='release' \
                      --exclude='.gitignore' \
                      --exclude='package.json' \
                      --exclude='package-lock.json' \
                      --exclude='RELEASE.md' \
                      ./ release/hm-split-background/

                  cd release
                  zip -r "hm-split-background-${{ steps.get_version.outputs.tag }}.zip" hm-split-background/
                  cd ..

                  echo "Created: release/hm-split-background-${{ steps.get_version.outputs.tag }}.zip"

            - name: Upload ZIP to release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      release/hm-split-background-${{ steps.get_version.outputs.tag }}.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
